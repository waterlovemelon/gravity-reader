name: myreader
description: "Cross-platform e-book reader app (iOS + Android)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.0
  
  # Database
  sqflite: ^2.4.0
  
  # Path Provider
  path_provider: ^2.1.0
  
  # Shared Preferences  
  shared_preferences: ^2.2.0
  
  # File Picker for iOS and Android
  file_picker: ^10.3.10
  image_picker: ^1.0.0
  intl: ^0.20.2
  charset_converter: ^2.3.0
  just_audio: ^0.10.4
  audio_session: ^0.2.1
  just_audio_background: ^0.0.1-beta.17
  
  # WebView for in-app browser
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Mocking
  mocktail: ^1.0.0

  # Build runner
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/book_placeholders/
